name: Bharat E-Vote Security Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  smart-contract-tests:
    name: Web3 Smart Contract Validation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js (EVM Environment)
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 📦 Install Root Dependencies
        run: npm ci || npm install

      - name: 🔨 Compile Ethereum Smart Contracts
        run: npx hardhat compile

      - name: 🛡️ Run Cryptographic Math Tests
        run: npx hardhat test

  frontend-build-check:
    name: React Frontend Compilation
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install

      - name: 🛠️ Verify Vite Production Build
        working-directory: ./frontend
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: npm run build
