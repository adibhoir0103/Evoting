specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Voting
    network: localhost
    source:
      address: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      abi: Voting
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Candidate
        - Vote
        - Voter
        - VotingStatus
      abis:
        - name: Voting
          file: ../artifacts/contracts/Voting.sol/Voting.json
      eventHandlers:
        - event: CandidateAdded(indexed uint256,string,string,uint8,uint8)
          handler: handleCandidateAdded
        - event: VoterAuthorized(indexed address,uint8,uint8)
          handler: handleVoterAuthorized
        - event: VoteCast(indexed address,indexed uint256)
          handler: handleVoteCast
        - event: VotingStatusChanged(bool)
          handler: handleVotingStatusChanged
        - event: VotingTimelineSet(uint256,uint256)
          handler: handleVotingTimelineSet
      file: ./src/mapping.ts

  - kind: ethereum
    name: ZKPVoting
    network: localhost
    source:
      address: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
      abi: ZKPVoting
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - ZKPVote
        - EligibleVoter
        - VoteVerification
      abis:
        - name: ZKPVoting
          file: ../artifacts/contracts/ZKPVoting.sol/ZKPVoting.json
      eventHandlers:
        - event: ZKPVoteSubmitted(indexed bytes32,indexed bytes32,string,uint256)
          handler: handleZKPVoteSubmitted
        - event: VoterRegistered(indexed bytes32)
          handler: handleVoterRegistered
        - event: VoteVerified(indexed bytes32,bool)
          handler: handleVoteVerified
        - event: ZKPModeChanged(bool)
          handler: handleZKPModeChanged
        - event: CandidateMetadataStored(indexed uint256,string)
          handler: handleCandidateMetadataStored
      file: ./src/zkp-mapping.ts
